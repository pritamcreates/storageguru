<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storage Guru — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#f4f3ef; --white:#fff; --dark:#0f0f0f;
    --accent:#e8521a; --accent2:#f0a500;
    --gray:#888; --border:#e0ddd8;
    --hdd:#4a9edd; --ssd:#2ec4a9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Montserrat',sans-serif;background:var(--bg);min-height:100vh;display:flex;overflow:hidden;}

  .left-panel{width:55%;background:var(--dark);display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden;}
  .left-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(232,82,26,.15),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(240,165,0,.1),transparent 50%);pointer-events:none;}

  .logo-mark{display:flex;align-items:center;gap:12px;z-index:1;}
  .logo-icon{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .logo-text{font-weight:800;font-size:20px;color:#fff;letter-spacing:-.3px;}

  .drive-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:32px;z-index:1;}
  .drive-dot{width:100%;aspect-ratio:1;border-radius:6px;animation:pulse 3s ease-in-out infinite;}
  .drive-dot:nth-child(odd){animation-delay:.5s;}
  .drive-dot.hdd{background:var(--hdd);opacity:.15;}
  .drive-dot.ssd{background:var(--ssd);opacity:.15;}
  .drive-dot.used{opacity:.4;}
  .drive-dot.danger{background:var(--accent);opacity:.5;}
  @keyframes pulse{0%,100%{opacity:.12;}50%{opacity:.3;}}

  .hero-text{z-index:1;}
  .hero-text h1{font-size:clamp(32px,4vw,52px);font-weight:800;color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:16px;}
  .hero-text h1 span{color:var(--accent);}
  .hero-text p{font-size:15px;color:#888;line-height:1.7;max-width:360px;}

  .stats-strip{display:flex;gap:32px;z-index:1;border-top:1px solid #222;padding-top:32px;animation:fadeUp .8s ease .4s both;}
  .stat-item{display:flex;flex-direction:column;gap:4px;}
  .stat-val{font-size:28px;font-weight:800;color:#fff;}
  .stat-label{font-size:12px;color:#555;letter-spacing:.5px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .right-panel{width:45%;display:flex;flex-direction:column;justify-content:center;padding:64px 56px;background:#fff;position:relative;}
  .right-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}

  .form-header{margin-bottom:40px;animation:fadeUp .5s ease .1s both;}
  .form-header h2{font-size:32px;font-weight:800;color:var(--dark);letter-spacing:-.5px;margin-bottom:8px;}
  .form-header p{font-size:14px;color:var(--gray);}

  .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:20px;display:none;}
  .msg.error{background:#fff0ed;color:var(--accent);border:1px solid #ffd5cb;display:block;}
  .msg.success{background:#edfaf7;color:#1a8a6f;border:1px solid #b3eadf;display:block;}

  .btn-google{width:100%;padding:16px;background:#fff;color:var(--dark);border:1.5px solid var(--border);border-radius:12px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:border-color .2s,box-shadow .2s,transform .1s;animation:fadeUp .5s ease .2s both;}
  .btn-google:hover{border-color:#bbb;box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px);}
  .btn-google:active{transform:translateY(0);}
  .btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .divider-note{text-align:center;margin-top:24px;font-size:12px;color:#bbb;animation:fadeUp .5s ease .3s both;}
  .divider-note span{color:var(--accent);font-weight:600;}
</style>
</head>
<body>

<div class="left-panel">
  <div class="logo-mark">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="6" width="18" height="5" rx="1.5" fill="white" opacity=".9"/>
        <circle cx="18" cy="8.5" r="1.2" fill="#0f0f0f"/>
        <rect x="3" y="13" width="18" height="5" rx="1.5" fill="white" opacity=".6"/>
        <circle cx="18" cy="15.5" r="1.2" fill="#0f0f0f"/>
      </svg>
    </div>
    <span class="logo-text">Storage Guru</span>
  </div>

  <div class="drive-grid">
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd danger"></div>
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd"></div>
    <div class="drive-dot ssd used"></div><div class="drive-dot hdd used"></div>
    <div class="drive-dot hdd danger"></div><div class="drive-dot hdd used"></div>
    <div class="drive-dot hdd"></div><div class="drive-dot ssd"></div>
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd danger"></div>
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd used"></div>
    <div class="drive-dot ssd used"></div><div class="drive-dot hdd"></div>
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd danger"></div>
    <div class="drive-dot hdd"></div><div class="drive-dot ssd used"></div>
    <div class="drive-dot hdd used"></div><div class="drive-dot hdd used"></div>
    <div class="drive-dot hdd danger"></div><div class="drive-dot hdd used"></div>
  </div>

  <div class="hero-text">
    <h1>Master your<br/><span>storage chaos.</span></h1>
    <p>Track every HDD & SSD across your collection. One drive a day, systematically organized — forever.</p>
  </div>

  <div class="stats-strip">
    <div class="stat-item"><span class="stat-val">40+</span><span class="stat-label">Drives tracked</span></div>
    <div class="stat-item"><span class="stat-val">∞</span><span class="stat-label">Cloud synced</span></div>
    <div class="stat-item"><span class="stat-val">1/day</span><span class="stat-label">Cleanup cadence</span></div>
  </div>
</div>

<div class="right-panel">
  <div class="form-header">
    <h2>Welcome back.</h2>
    <p>Sign in or create your account with Google</p>
  </div>

  <div id="msg" class="msg"></div>

  <button class="btn-google" id="googleBtn" onclick="handleGoogleLogin()">
    <svg width="20" height="20" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider-note">Your drives. Your data. Synced to <span>the cloud</span>.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ─────────────────────────────────────────────────────────
// 🔧 PASTE YOUR FIREBASE CONFIG HERE
//    Firebase Console → Project Settings → Your apps → SDK setup
// ─────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
// ─────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

const GOOGLE_BTN_HTML = `<svg width="20" height="20" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg> Continue with Google`;

// If already signed in (or returning from redirect), go to dashboard
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'dashboard.html';
});

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}

window.handleGoogleLogin = async function() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged will handle the redirect
  } catch(err) {
    if (err.code === 'auth/popup-blocked') {
      // Fallback: full-page redirect (works on mobile / strict browsers)
      try {
        const { signInWithRedirect } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        await signInWithRedirect(auth, provider);
      } catch(e2) {
        showMsg('Pop-up blocked and redirect failed. Please allow pop-ups for this site.', 'error');
        resetBtn();
      }
    } else if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
      showMsg('Sign-in cancelled.', 'error');
      resetBtn();
    } else {
      showMsg('Google sign-in failed: ' + (err.message || err.code), 'error');
      resetBtn();
    }
  }
};

function resetBtn() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = false;
  btn.innerHTML = GOOGLE_BTN_HTML;
}
</script>
</body>
</html>
